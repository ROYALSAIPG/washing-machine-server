<!DOCTYPE html>
<html>
<head>
    <title>Machine Admin Panel</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; width: 400px; margin-bottom: 20px; }
        input { padding: 5px; margin: 5px; }
        button { padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<h2>⚙️ Machine Admin Panel</h2>

<div class="box">
    <h3>💰 Pricing Settings</h3>

    <div id="priceList"></div>

    <button onclick="addRow()">➕ Add New</button><br><br>
    <button onclick="saveSettings()">💾 Save</button>
</div>

<div class="box">
    <h3>🎮 Manual Control</h3>
    <button onclick="startMachine()">▶️ Start</button>
    <button onclick="stopMachine()">⏹️ Stop</button>
</div>

<div class="box">
    <h3>📊 Machine Status</h3>
    <pre id="statusBox">Loading...</pre>
</div>

<script>

function addRow(amount="", duration="") {
    let div = document.createElement("div");

    div.innerHTML = `
        ₹ <input type="number" class="amount" value="${amount}" placeholder="Amount (₹)">
        → <input type="number" class="duration" value="${duration}" placeholder="Minutes">
        <button onclick="this.parentElement.remove()">❌</button>
    `;

    document.getElementById("priceList").appendChild(div);
}

function loadSettings() {
    fetch("/get-settings")
    .then(res => res.json())
    .then(data => {
        document.getElementById("priceList").innerHTML = "";

        for (let amt in data.prices) {
            addRow(amt/100, data.prices[amt]); // paisa → ₹
        }
    });
}

function saveSettings() {
    let amounts = document.getElementsByClassName("amount");
    let durations = document.getElementsByClassName("duration");

    let prices = {};

    for (let i = 0; i < amounts.length; i++) {
        let amt = parseInt(amounts[i].value) * 100; // ₹ → paisa
        let dur = parseInt(durations[i].value);

        if (amt && dur) {
            prices[amt] = dur;
        }
    }

    fetch("/update-settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({prices: prices})
    })
    .then(res => res.json())
    .then(() => {
        alert("✅ Saved Successfully");
        loadSettings();
    });
}

function loadStatus() {
    fetch("/status")
    .then(res => res.json())
    .then(data => {
        document.getElementById("statusBox").innerText =
            JSON.stringify(data, null, 2);
    });
}

function startMachine() {
    fetch("/manual-start", {method: "POST"});
}

function stopMachine() {
    fetch("/manual-stop", {method: "POST"});
}

setInterval(loadStatus, 3000);
loadSettings();
loadStatus();

</script>

</body>
</html>
