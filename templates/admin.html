<!DOCTYPE html>
<html>
<head>
    <title>Machine Admin Panel</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; width: 320px; margin-bottom: 20px; }
        input { padding: 5px; margin: 5px 0; width: 100%; }
        button { padding: 10px; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

<h2>⚙️ Machine Admin Panel</h2>

<div class="box">
    <h3>💰 Update Pricing</h3>

    <label>₹1 (100 paisa):</label>
    <input type="number" id="p100">

    <label>₹2 (200 paisa):</label>
    <input type="number" id="p200">

    <button onclick="updateSettings()">Update</button>
</div>

<div class="box">
    <h3>🎮 Manual Control</h3>

    <button onclick="startMachine()">▶️ Start</button>
    <button onclick="stopMachine()">⏹️ Stop</button>
</div>

<div class="box">
    <h3>📊 Machine Status</h3>
    <pre id="statusBox">Loading...</pre>
</div>

<script>
function loadSettings() {
    fetch("/get-settings")
    .then(res => res.json())
    .then(data => {
        document.getElementById("p100").value = data.prices[100];
        document.getElementById("p200").value = data.prices[200];
    });
}

function updateSettings() {
    let p100 = document.getElementById("p100").value;
    let p200 = document.getElementById("p200").value;

    fetch("/update-settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            prices: {
                100: parseInt(p100),
                200: parseInt(p200)
            }
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("✅ Updated");
        loadSettings();
    });
}

function loadStatus() {
    fetch("/status")
    .then(res => res.json())
    .then(data => {
        document.getElementById("statusBox").innerText =
            JSON.stringify(data, null, 2);
    });
}

function startMachine() {
    fetch("/manual-start", {method: "POST"})
    .then(() => alert("▶️ Started"));
}

function stopMachine() {
    fetch("/manual-stop", {method: "POST"})
    .then(() => alert("⏹️ Stopped"));
}

setInterval(loadStatus, 3000);
loadSettings();
loadStatus();
</script>

</body>
</html>
