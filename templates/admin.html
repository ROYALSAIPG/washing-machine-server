<!DOCTYPE html>
<html>
<head>
    <title>Machine Admin Panel</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; width: 400px; margin-bottom: 20px; }
        input { padding: 5px; margin: 5px; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>

<h2>⚙️ Machine Admin Panel</h2>

<div class="box">
    <h3>💰 Pricing Settings</h3>

    <div id="priceList"></div>

    <button onclick="addRow()">➕ Add New</button><br><br>
    <button onclick="saveSettings()">💾 Save</button>
</div>

<div class="box">
    <h3>🎮 Manual Control</h3>

    <label>Duration (minutes):</label>
    <input type="number" id="manualDuration" value="1">

    <br>

    <button onclick="startMachine()">▶️ Start</button>
    <button onclick="stopMachine()">⏹️ Stop</button>

    <hr>

    <b>Quick Start:</b><br>
    <button onclick="quickStart(1)">1 min</button>
    <button onclick="quickStart(5)">5 min</button>
    <button onclick="quickStart(10)">10 min</button>
</div>

<div class="box">
    <h3>📊 Machine Status</h3>
    <pre id="statusBox">Loading...</pre>
</div>

<script>

function addRow(amount="", duration="") {
    let div = document.createElement("div");

    div.innerHTML = `
        ₹ <input type="number" class="amount" value="${amount}" placeholder="Amount (₹)">
        → <input type="number" class="duration" value="${duration}" placeholder="Minutes">
        <button onclick="this.parentElement.remove()">❌</button>
    `;

    document.getElementById("priceList").appendChild(div);
}

function loadSettings() {
    fetch("/get-settings")
    .then(res => res.json())
    .then(data => {
        document.getElementById("priceList").innerHTML = "";

        for (let amt in data.prices) {
            addRow(amt/100, data.prices[amt]);
        }
    });
}

function saveSettings() {
    let amounts = document.getElementsByClassName("amount");
    let durations = document.getElementsByClassName("duration");

    let prices = {};

    for (let i = 0; i < amounts.length; i++) {
        let amt = parseInt(amounts[i].value) * 100;
        let dur = parseInt(durations[i].value);

        if (amt && dur) {
            prices[amt] = dur;
        }
    }

    fetch("/update-settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({prices: prices})
    })
    .then(res => res.json())
    .then(() => {
        alert("✅ Saved Successfully");
        loadSettings();
    });
}

function loadStatus() {
    fetch("/status")
    .then(res => res.json())
    .then(data => {
        document.getElementById("statusBox").innerText =
            JSON.stringify(data, null, 2);
    });
}

// ✅ UPDATED START (WITH DURATION)
function startMachine() {
    let duration = document.getElementById("manualDuration").value;

    fetch("/manual-start", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({duration: parseInt(duration)})
    })
    .then(() => alert("▶️ Started for " + duration + " min"));
}

// ✅ QUICK BUTTONS
function quickStart(min) {
    document.getElementById("manualDuration").value = min;
    startMachine();
}

// STOP
function stopMachine() {
    fetch("/manual-stop", {method: "POST"})
    .then(() => alert("⏹️ Stopped"));
}

setInterval(loadStatus, 3000);
loadSettings();
loadStatus();

</script>

</body>
</html>
